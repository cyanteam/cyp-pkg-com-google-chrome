name: Build Chrome Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Chrome version (e.g. 138.0.7204.100)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cyp
        run: |
          curl -fsSL https://cyp.cyteam.cc.cd/install.sh | bash
          echo "$HOME/.cyp/bin" >> $GITHUB_PATH

      - name: Update version in _CYPPACKAGE.TOML
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' _CYPPACKAGE.TOML

      - name: Download Chrome - macOS ARM64
        run: |
          mkdir -p macosarm64/_CYPASSETS
          curl -fsSL "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" -o chrome.dmg
          # Extract Chrome.app from DMG (requires hfsutils or 7z)
          7z x chrome.dmg -o./dmg_content || true
          find ./dmg_content -name "Google Chrome.app" -exec cp -R {} macosarm64/_CYPASSETS/ \; || true
          rm -rf chrome.dmg dmg_content

      - name: Download Chrome - macOS Intel
        run: |
          mkdir -p macosintel/_CYPASSETS
          # Same universal binary works for both
          cp -R macosarm64/_CYPASSETS/* macosintel/_CYPASSETS/ 2>/dev/null || true

      - name: Download Chrome - Linux x64
        run: |
          mkdir -p linux64/_CYPASSETS
          curl -fsSL "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb" -o chrome.deb
          ar x chrome.deb
          tar -xzf control.tar.gz 2>/dev/null || true
          tar -xzf data.tar.gz 2>/dev/null || true
          cp -R opt/google/chrome/* linux64/_CYPASSETS/ 2>/dev/null || true
          rm -rf chrome.deb control.tar.gz data.tar.gz opt usr

      - name: Download Chrome - Windows x64
        run: |
          mkdir -p win64/_CYPASSETS
          curl -fsSL "https://dl.google.com/dl/chrome/win64/googlechromestandaloneenterprise64.msi" -o chrome.msi || true
          7z x chrome.msi -o./msi_content 2>/dev/null || true
          find ./msi_content -name "chrome.exe" -exec cp {} win64/_CYPASSETS/ \; 2>/dev/null || true
          rm -rf chrome.msi msi_content

      - name: Pack with cyp
        run: |
          cyp pack .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: "*.cyp"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
