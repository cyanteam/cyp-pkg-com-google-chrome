name: Update Chrome

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'force version (leave empty for latest stable)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cyp
        run: npm install -g cyp

      - name: Get latest Chrome version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
          else
            VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions.json" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['channels']['Stable']['version'])" 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              echo "Failed to get latest version"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest Chrome version: $VERSION"

      - name: Check if version already exists
        id: check
        continue-on-error: true
        run: |
          git fetch --tags
          if git tag | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Version ${{ steps.version.outputs.version }} already exists, skipping"
            exit 1
          fi

      - name: Download Chrome for Testing - Linux64
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/linux64/_CYPASSETS
          cd build/linux64
          curl -L -o chrome-linux64.zip "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/linux64/chrome-linux64.zip"
          unzip -q chrome-linux64.zip
          cp chrome-linux64/chrome _CYPASSETS/chrome 2>/dev/null || true
          rm -rf chrome-linux64 chrome-linux64.zip

      - name: Download Chrome for Testing - Win64
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/win64/_CYPASSETS
          cd build/win64
          curl -L -o chrome-win64.zip "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/win64/chrome-win64.zip"
          unzip -q chrome-win64.zip
          cp -r chrome-win64/* _CYPASSETS/ 2>/dev/null || true
          rm -rf chrome-win64 chrome-win64.zip

      - name: Download Chrome for Testing - macOS ARM64
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/macos-arm64/_CYPASSETS
          cd build/macos-arm64
          curl -L -o chrome-mac-arm64.zip "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/mac-arm64/chrome-mac-arm64.zip"
          unzip -q chrome-mac-arm64.zip
          cp -r "Google Chrome for Testing.app" _CYPASSETS/ 2>/dev/null || true
          rm -rf chrome-mac-arm64.zip

      - name: Download Chrome for Testing - macOS x64
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/macos-x64/_CYPASSETS
          cd build/macos-x64
          curl -L -o chrome-mac-x64.zip "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/mac-x64/chrome-mac-x64.zip"
          unzip -q chrome-mac-x64.zip
          cp -r "Google Chrome for Testing.app" _CYPASSETS/ 2>/dev/null || true
          rm -rf chrome-mac-x64.zip

      - name: Create package configs and pack
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # Linux64
          cat > build/linux64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "linux64"
          author = "Google"

          [config_command]
          linux64 = "./_CYPASSETS/chrome"
          EOF
          cat > build/linux64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "which google-chrome || which chrome"
          EOF
          cd build/linux64 && cyp pack . -o ../../dist/chrome-${VERSION}-linux64.cyp; cd ../..

          # Win64
          cat > build/win64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "win64"
          author = "Google"

          [config_command]
          win64 = "./_CYPASSETS/chrome.exe"
          EOF
          cat > build/win64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "where chrome"
          EOF
          cd build/win64 && cyp pack . -o ../../dist/chrome-${VERSION}-win64.cyp; cd ../..

          # macOS ARM64
          cat > build/macos-arm64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "macosarm64"
          author = "Google"

          [config_command]
          macosarm64 = "open './_CYPASSETS/Google Chrome for Testing.app'"
          EOF
          cat > build/macos-arm64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "ls '/Applications/Google Chrome.app'"
          EOF
          cd build/macos-arm64 && cyp pack . -o ../../dist/chrome-${VERSION}-macosarm64.cyp; cd ../..

          # macOS x64
          cat > build/macos-x64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "macosintel"
          author = "Google"

          [config_command]
          macosintel = "open './_CYPASSETS/Google Chrome for Testing.app'"
          EOF
          cat > build/macos-x64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "ls '/Applications/Google Chrome.app'"
          EOF
          cd build/macos-x64 && cyp pack . -o ../../dist/chrome-${VERSION}-macosintel.cyp; cd ../..

          ls -lh dist/ || true

      - name: Create version branch and tag
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/version = \"0.0.0\"/version = \"${VERSION}\"/" _CYPPACKAGE.TOML
          git add _CYPPACKAGE.TOML
          git commit -m "Update Chrome to ${VERSION}" || true
          git checkout -b "v${VERSION}" 2>/dev/null || git checkout "v${VERSION}"
          git push origin "v${VERSION}" || true
          git tag "v${VERSION}"
          git push origin "v${VERSION}" --tags || true

      - name: Create GitHub Release
        if: steps.check.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Chrome ${{ steps.version.outputs.version }}
          body: |
            Google Chrome stable version ${{ steps.version.outputs.version }}

            Install: `cyp install chrome`

            | File | Platform |
            |------|----------|
            | `chrome-${{ steps.version.outputs.version }}-macosarm64.cyp` | macOS ARM64 |
            | `chrome-${{ steps.version.outputs.version }}-macosintel.cyp` | macOS x64 |
            | `chrome-${{ steps.version.outputs.version }}-linux64.cyp` | Linux x64 |
            | `chrome-${{ steps.version.outputs.version }}-win64.cyp` | Windows x64 |
          files: |
            dist/*.cyp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -rf build dist
