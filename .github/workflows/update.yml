name: Update Chrome

on:
  schedule:
    # 每天 UTC 6:00（北京时间 14:00）检查更新
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: '强制指定版本号（留空则自动检测最新稳定版）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cyp
        run: npm install -g cyp

      - name: Get latest Chrome version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
          else
            # 从 Google 版本历史 API 获取最新稳定版
            VERSION=$(curl -s "https://versionhistory.googleapis.com/v1/chrome/platforms/linux/channels/stable/versions" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['versions'][0]['version'])" 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              echo "Failed to get latest version"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest Chrome version: $VERSION"

      - name: Check if version already exists
        id: check
        continue-on-error: true
        run: |
          git fetch --tags
          if git tag | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Version ${{ steps.version.outputs.version }} already exists, skipping"
            exit 1
          fi

      - name: Download Chrome - Linux
        if: steps.check.outcome == 'success'
        run: |
          mkdir -p build/linux64/_CYPASSETS
          cd build/linux64
          curl -L -o _CYPASSETS/google-chrome-stable_current_amd64.deb \
            "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          # 从 deb 中提取 chrome 二进制
          ar x _CYPASSETS/google-chrome-stable_current_amd64.deb
          tar xf data.tar.xz || tar xf data.tar.gz
          cp opt/google/chrome/google-chrome-stable _CYPASSETS/google-chrome-stable 2>/dev/null || true
          rm -f _CYPASSETS/google-chrome-stable_current_amd64.deb control.tar.* data.tar.* debian.binary

      - name: Download Chrome - Windows
        if: steps.check.outcome == 'success'
        run: |
          mkdir -p build/win64/_CYPASSETS
          cd build/win64
          curl -L -o _CYPASSETS/chrome_installer.exe \
            "https://dl.google.com/chrome/dl/channel/stable/win64/googlechromestandaloneenterprise64.msi"

      - name: Download Chrome - macOS
        if: steps.check.outcome == 'success'
        run: |
          mkdir -p build/macos/_CYPASSETS
          cd build/macos
          curl -L -o _CYPASSETS/googlechrome.dmg \
            "https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg"

      - name: Create package configs
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Linux64
          cat > build/linux64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "linux64"
          author = "Google"

          [config_command]
          linux64 = "./_CYPASSETS/google-chrome-stable"
          EOF

          cat > build/linux64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "which google-chrome-stable || which google-chrome"
          EOF

          # Win64
          cat > build/win64/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "win64"
          author = "Google"

          [config_command]
          win64 = "./_CYPASSETS/chrome_installer.exe"
          EOF

          cat > build/win64/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "where chrome"
          EOF

          # macOS (universal - 包含 arm64 和 x86_64)
          cat > build/macos/_CYPPACKAGE.TOML << EOF
          name = "chrome"
          name_cn = "Chrome 浏览器"
          version = "${VERSION}"
          package_id = "com.google.chrome"
          language = "native"
          architecture = "macosarm64"
          author = "Google"

          [config_command]
          macosarm64 = "open './_CYPASSETS/Google Chrome.app'"
          macosintel = "open './_CYPASSETS/Google Chrome.app'"
          EOF

          cat > build/macos/_CYPREQUIRE.TOML << 'EOF'
          [[dependency]]
          name = "chrome"
          type = "runtime"
          check_command = "ls '/Applications/Google Chrome.app'"
          EOF

      - name: Pack cyp packages
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # Linux64
          cd build/linux64
          cyp pack . -o ../../dist/chrome-${VERSION}-linux64.cyp || echo "cyp pack linux64 failed, creating zip fallback"
          cd ../..

          # Win64
          cd build/win64
          cyp pack . -o ../../dist/chrome-${VERSION}-win64.cyp || echo "cyp pack win64 failed, creating zip fallback"
          cd ../..

          # macOS
          cd build/macos
          cyp pack . -o ../../dist/chrome-${VERSION}-macosarm64.cyp || echo "cyp pack macos failed, creating zip fallback"
          cd ../..

          # 列出构建产物
          ls -lh dist/ || true

      - name: Create version branch and tag
        if: steps.check.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 更新 _CYPPACKAGE.TOML 中的版本号
          sed -i "s/version = \"0.0.0\"/version = \"${VERSION}\"/" _CYPPACKAGE.TOML
          git add _CYPPACKAGE.TOML
          git commit -m "Update Chrome to ${VERSION}" || true

          # 创建版本分支
          git checkout -b "v${VERSION}" || git checkout "v${VERSION}"
          git push origin "v${VERSION}" || true

          # 创建 tag
          git tag "v${VERSION}"
          git push origin "v${VERSION}" --tags || true

      - name: Create GitHub Release
        if: steps.check.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Chrome ${{ steps.version.outputs.version }}
          body: |
            Google Chrome stable version ${{ steps.version.outputs.version }}

            ## 安装
            ```
            cyp install chrome
            ```

            ## 平台文件
            | 文件 | 平台 |
            |------|------|
            | `chrome-${{ steps.version.outputs.version }}-macosarm64.cyp` | macOS ARM64 |
            | `chrome-${{ steps.version.outputs.version }}-linux64.cyp` | Linux x64 |
            | `chrome-${{ steps.version.outputs.version }}-win64.cyp` | Windows x64 |
          files: |
            dist/*.cyp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -rf build dist
